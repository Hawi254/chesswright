<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{% block title %}Chesswright Report{% endblock %}</title>
<style>
  /*
    Color tokens below are a one-time static copy of the hex literals in
    dashboard/theme.py (BG, BG_SECONDARY, ACCENT_GOLD, POSITIVE, NEGATIVE,
    TEXT, TEXT_MUTED). This file cannot import theme.py -- it's a
    standalone HTML document, not a Streamlit page -- so if the palette
    ever changes in theme.py, update these values here too.
  */
  :root {
    --bg: #14181F;
    --bg-secondary: #1E2530;
    --accent-gold: #C19A4B;
    --positive: #6FA98C;
    --negative: #B0584F;
    --text: #E8E6E1;
    --text-muted: #E8E6E199;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--text);
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial,
                 sans-serif;
    line-height: 1.6;
    padding: 2.5rem 1.5rem 4rem;
  }

  .report {
    max-width: 42rem;
    margin: 0 auto;
  }

  .report-header {
    background: var(--bg-secondary);
    border: 1px solid #ffffff14;
    border-radius: 10px;
    padding: 1.25rem 1.5rem;
    margin-bottom: 2rem;
  }

  .report-header h1 {
    margin: 0 0 0.75rem;
    font-size: 1.4rem;
    color: var(--accent-gold);
  }

  .report-meta {
    display: flex;
    flex-wrap: wrap;
    gap: 0.4rem 1.4rem;
    font-size: 0.92rem;
    color: var(--text-muted);
  }

  .report-meta strong {
    color: var(--text);
    font-weight: 600;
  }

  .result-win { color: var(--positive); font-weight: 600; }
  .result-loss { color: var(--negative); font-weight: 600; }
  .result-draw { color: var(--text); font-weight: 600; }

  /* Styling for the markdown-converted report body. The Claude prompt
     that produces this text only ever emits bold "headings" as plain
     paragraphs, bullet lists, and numbered lists -- no real <h1>-<h6>,
     no tables, no fenced code -- so bare-tag selectors scoped to
     .report-body are sufficient and won't leak into the header block
     above. */
  .report-body p {
    margin: 1.1rem 0;
  }

  .report-body strong {
    color: var(--accent-gold);
  }

  .report-body ul,
  .report-body ol {
    padding-left: 1.4rem;
    margin: 1rem 0;
  }

  .report-body li {
    margin: 0.55rem 0;
  }

  .report-body em {
    color: var(--text-muted);
  }

  .report-body a {
    color: var(--accent-gold);
  }

  h2.section-heading {
    margin: 2.25rem 0 0.9rem;
    font-size: 1.05rem;
    color: var(--accent-gold);
    border-bottom: 1px solid #ffffff14;
    padding-bottom: 0.4rem;
  }

  p.section-caption {
    margin: -0.4rem 0 0.9rem;
    color: var(--text-muted);
    font-size: 0.88rem;
  }

  table.report-table {
    width: 100%;
    border-collapse: collapse;
    margin: 0.5rem 0 1.5rem;
    font-size: 0.9rem;
  }

  table.report-table th,
  table.report-table td {
    text-align: left;
    padding: 0.5rem 0.7rem;
    border-bottom: 1px solid #ffffff14;
  }

  table.report-table th {
    color: var(--text-muted);
    font-weight: 600;
    font-size: 0.8rem;
    text-transform: uppercase;
    letter-spacing: 0.03em;
  }

  table.report-table tr:last-child td {
    border-bottom: none;
  }

  .empty-note {
    color: var(--text-muted);
    font-style: italic;
    margin: 0.5rem 0 1.5rem;
  }

  footer {
    max-width: 42rem;
    margin: 3rem auto 0;
    padding-top: 1rem;
    border-top: 1px solid #ffffff14;
    color: var(--text-muted);
    font-size: 0.82rem;
    text-align: center;
  }

  @media (max-width: 480px) {
    body { padding: 1.5rem 1rem 3rem; }
    .report-header { padding: 1rem; }
  }

  @media print {
    body { background: #fff; color: #111; }
    .report-header { background: #f2f2f2; border-color: #ccc; }
    .report-body strong { color: #7a5b1e; }
    footer { color: #666; }
    table.report-table th, table.report-table td { border-color: #ccc; }
  }
</style>
</head>
<body>
<div class="report">
{% block content %}{% endblock %}
</div>
<footer>
  Generated by Chesswright{% if generated_at %} &middot; {{ generated_at }}{% endif %}
</footer>
</body>
</html>
