# BRIEF.md S2/Phase C: cross-platform PyInstaller build matrix.
#
# What this DOES verify: that a build actually succeeds on real Windows
# and macOS (not just Linux, the only platform directly testable in
# development) -- a real executable/app bundle comes out the other end.
#
# What this DOES NOT verify: that the built artifact actually RUNS
# correctly on that platform. Code-signing/Gatekeeper warnings on
# unsigned macOS apps, antivirus false-positives on unsigned Windows
# .exes, and platform-specific path/permission quirks can only be caught
# by a real person launching the artifact on that OS -- that's what
# Phase D's pilot group is explicitly for, not a gap this workflow is
# trying to close.
#
# Stockfish is never installed/bundled here, deliberately -- see
# BRIEF.md S1. Every build expects the END USER to have their own
# Stockfish install; the onboarding wizard's engine-detection step
# (dashboard/onboarding_view.py) handles that at runtime, not at build
# time.
name: Build desktop app

on:
  push:
    tags:
      - "v*"
  pull_request:
    paths:
      - "desktop_app.py"
      - "chesswright.spec"
      - "dashboard/**"
      - "*.py"
      - "config.yaml"
      - "migrations/**"
      - "requirements.txt"
      - ".github/workflows/build.yml"
  workflow_dispatch: {}

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: chesswright-linux
            exe: dist/chesswright/chesswright
          - os: windows-latest
            artifact_name: chesswright-windows
            exe: dist/chesswright/chesswright.exe
          - os: macos-latest
            artifact_name: chesswright-macos
            exe: dist/chesswright/chesswright
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      # NOT used on Linux -- see the venv step below for why. Still used
      # as-is on Windows/macOS, which have no equivalent gi/GTK problem
      # (pywebview uses native Edge WebView2 / Cocoa backends there).
      - uses: actions/setup-python@v5
        if: matrix.os != 'ubuntu-latest'
        with:
          python-version: "3.12"

      # pywebview's Linux backend needs GTK/WebKit2's introspection
      # bindings (PyGObject/`gi`) -- C-extension bindings tied to the
      # SYSTEM's GTK install, not something pip can build standalone.
      # Confirmed locally during development (the same fix is being
      # applied here, not a new one): a venv without --system-site-
      # packages can import pywebview but can't actually open a window.
      - name: Install Linux GTK/WebKit dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-gi python3-gi-cairo gir1.2-gtk-3.0 \
            gir1.2-webkit2-4.1 libgirepository1.0-dev gcc libcairo2-dev \
            pkg-config python3-dev python3-venv python3-pip

      # The actual bug a real pilot tester hit (v0.1.1): `gi` was
      # importable in EVERY local dev/build check throughout this
      # project, but never in CI -- root cause, confirmed by reading
      # what these two steps actually do, not assumed: actions/setup-
      # python@v5 downloads and installs its OWN self-contained Python
      # build, completely separate from the runner image's pre-installed
      # system python3 -- the one the apt step above actually populates
      # with `gi`. Every later step (pip install, pyinstaller) was
      # running against that DOWNLOADED interpreter, which never had `gi`
      # at all, so PyInstaller correctly never found it to bundle -- it
      # genuinely wasn't there. Fixed the same way the local dev venv was
      # fixed earlier in this project: build a venv from the SYSTEM
      # python3 (not setup-python's one) with --system-site-packages, so
      # it inherits the apt-installed `gi` bindings. Prepending its bin/
      # to GITHUB_PATH means every later step's plain `python`/`pip`/
      # `pyinstaller` calls resolve into this venv automatically, with no
      # other step needing to change.
      - name: Set up Linux build venv (inherits system gi/GTK bindings)
        if: matrix.os == 'ubuntu-latest'
        run: |
          python3 -m venv --system-site-packages .venv
          echo "$PWD/.venv/bin" >> "$GITHUB_PATH"

      # -c constraints.txt locks every TRANSITIVE dep (and PyInstaller
      # itself) to the exact versions the test suite was run against --
      # v0.1.16 shipped an untested numpy 2.x (x86-64-v2 CPU baseline)
      # to a pilot tester's older machine precisely because transitives
      # were re-resolved fresh on every CI build. See constraints.txt's
      # own header for how to regenerate it deliberately.
      # --ignore-installed: on Linux the venv inherits system site-packages
      # (for gi/GTK), and apt's copies of common deps (requests, certifi,
      # cryptography, ...) otherwise "satisfy" requirements so pip never
      # installs the pinned versions -- the first constraint-checked run
      # proved every prior Linux bundle had been shipping Ubuntu's apt
      # versions, not the resolved ones. This forces the full pinned
      # closure into the venv, shadowing the system copies.
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --ignore-installed -r requirements.txt -c constraints.txt
          pip install pyinstaller -c constraints.txt

      # The constraints file only binds what pip installs in the step
      # above; this asserts the RESULTING environment -- what PyInstaller
      # is about to freeze -- actually matches the pins, and that nothing
      # unpinned slipped in (e.g. a platform-only dep missing from the
      # cross-platform resolve that generated constraints.txt).
      - name: Verify installed versions match constraints.txt
        run: python scripts/ci_check_constraints.py

      - name: Build with PyInstaller
        run: pyinstaller chesswright.spec --noconfirm

      # v0.1.20 shipped this file via chesswright.spec's `datas`, which
      # put it through PyInstaller's automatic binary-vs-data
      # reclassification (build_main.py inspects every datas/binaries
      # file's actual content) -- .duckdb_extension files are genuine
      # Mach-O dylibs with DuckDB's own metadata footer appended after
      # them, so they get reclassified as BINARY and run through
      # PyInstaller's macOS codesign step, which fails on that trailing
      # footer with "main executable failed strict validation" (the real
      # v0.1.20 macOS build failure, Linux/Windows unaffected since they
      # have no codesign step). Copying it in here, entirely outside
      # PyInstaller's Analysis/COLLECT TOC, sidesteps that reclassification
      # completely.
      #
      # v0.1.21 then tried re-signing it ourselves on macOS with a plain
      # `codesign -s - --force` (no --all-architectures/--timestamp) --
      # SAME failure, "main executable failed strict validation", proving
      # the flags were never the cause. The real signal was codesign's own
      # first line of output: "replacing existing signature" -- the file
      # DuckDB serves already carries a valid signature (applied by
      # DuckDB's own build, presumably accounting for their footer
      # correctly), and it's OUR re-sign attempt that breaks it by
      # re-hashing under standard Mach-O assumptions that don't match
      # DuckDB's footer layout. Fix: never touch its signature at all --
      # `cp` alone preserves the original file bytes, signature included,
      # so Apple Silicon's dlopen() requirement is already satisfied by
      # DuckDB's own signing, not ours.
      - name: Bundle DuckDB sqlite extension (post-build, outside PyInstaller's TOC)
        shell: bash
        run: |
          mkdir -p dist/chesswright/_internal/duckdb_extensions
          cp build_assets/duckdb_extensions/sqlite_scanner.duckdb_extension \
             dist/chesswright/_internal/duckdb_extensions/
          if [ "$RUNNER_OS" = "macOS" ]; then
            codesign --verify --verbose dist/chesswright/_internal/duckdb_extensions/sqlite_scanner.duckdb_extension
            echo "OK: sqlite_scanner.duckdb_extension carries a valid pre-existing signature, left untouched."
          fi

      # Confirmed live (the actual bug, not a hypothetical), not just
      # building and hoping: the build succeeding does not mean `gi` was
      # actually bundled -- v0.1.1's Linux build "succeeded" and still
      # crashed at runtime with "GTK cannot be loaded: No module named
      # 'gi'". Checking inside the FROZEN bundle's own internal/ directory
      # for a real gi package, in this run, against the artifact about to
      # ship, catches that class of failure before a pilot tester does.
      - name: Verify gi/GTK bindings were actually bundled (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          if [ ! -d "dist/chesswright/_internal/gi" ]; then
            echo "::error::gi package missing from the frozen bundle -- pywebview will fail with 'GTK cannot be loaded' at runtime, the exact v0.1.1 bug."
            exit 1
          fi
          echo "OK: gi package is present in the frozen Linux bundle."

      # DuckDB's sqlite_scanner is fetched at build time (see
      # chesswright.spec) precisely so first launch never touches
      # extensions.duckdb.org -- the v0.1.19 Windows pilot failure was a
      # firewalled machine dying on that download at startup. Same
      # lesson as the gi check above: the build succeeding doesn't prove
      # the file landed in the bundle, and a file being PRESENT doesn't
      # prove it loads (wrong platform/duckdb version would also fail
      # only at runtime). So load it, from the exact artifact about to
      # ship, on every platform in the matrix.
      - name: Verify bundled DuckDB sqlite extension loads (all platforms)
        shell: bash
        run: |
          python - <<'EOF'
          import pathlib, sys
          import duckdb
          ext = pathlib.Path("dist/chesswright/_internal/duckdb_extensions/sqlite_scanner.duckdb_extension")
          if not ext.exists():
              print("::error::sqlite_scanner.duckdb_extension missing from the frozen bundle -- first launch would need extensions.duckdb.org, the exact v0.1.19 pilot failure.")
              sys.exit(1)
          duckdb.connect().execute(f"LOAD '{ext.resolve().as_posix()}'")
          print(f"OK: bundled sqlite_scanner loads in duckdb {duckdb.__version__}.")
          EOF

      # Imports EVERY module the dashboard loads at runtime, inside the
      # FROZEN interpreter -- the direct guard against a backend module
      # dropped from chesswright.spec's BACKEND_MODULES, or an uncollected
      # third-party dep (BRIEF §6n). The build succeeding does not mean
      # dashboard/app.py's own top-level imports resolve at runtime; this
      # runs them, so that failure surfaces here instead of on a pilot's
      # first page load. Cross-platform: a bundling gap can differ per OS.
      - name: Smoke-test the frozen bundle's import graph
        shell: bash
        run: "${{ matrix.exe }} --check-imports"

      # Boots the built server headlessly and confirms it actually serves
      # (health ok + / returns Streamlit's frontend, not a 404) -- catches
      # the streamlit-static-not-bundled class the import check can't see.
      # Linux only: the serving/static layer isn't OS-specific, and one
      # platform proving it is enough to fail a broken release.
      - name: Smoke-test the frozen bundle boots and serves (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: python scripts/ci_smoke_boot.py dist/chesswright/chesswright

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/chesswright/
          retention-days: 30

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    # The default GITHUB_TOKEN is read-only unless a job explicitly
    # requests write access -- confirmed live, not assumed: the first
    # real tag push failed this exact step with a 403 ("Resource not
    # accessible by integration") because this permissions block didn't
    # exist yet.
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      # actions/upload-artifact does NOT preserve POSIX permission bits
      # (a well-documented GitHub Actions limitation, not something this
      # workflow did wrong specifically) -- the `build` job's PyInstaller
      # step produces an executable `chesswright` binary with the exec
      # bit set, but it comes back out of the artifact non-executable.
      # Confirmed live: v0.1.0's first published release had this exact
      # bug -- `./chesswright` on Linux failed with "Permission denied".
      # Re-applying chmod here, before re-zipping, is the standard fix --
      # Windows' .exe needs no equivalent (NTFS doesn't use exec bits).
      - name: Restore executable permission lost by upload-artifact
        run: |
          chmod +x artifacts/chesswright-linux/chesswright
          chmod +x artifacts/chesswright-macos/chesswright

      # Each platform's artifact is a whole directory (PyInstaller
      # --onedir, not --onefile -- see chesswright.spec's own notes on
      # why) -- zipped here so the release page offers one downloadable
      # file per platform instead of an unzipped tree.
      - name: Zip each platform's build
        run: |
          cd artifacts
          for dir in */; do
            name="${dir%/}"
            zip -r "../${name}.zip" "$name"
          done

      # Checks the fix actually worked, in THIS run, on the ACTUAL zips
      # about to be published -- not just trusting that chmod+zip do what
      # they're supposed to. Downloading a multi-hundred-MB release asset
      # back down to verify it by hand is real but slow/unreliable from a
      # typical dev machine; checking it here, right after creating it,
      # costs nothing extra and catches a regression before it ships
      # rather than after a pilot tester reports it again.
      - name: Verify executable permission survived the zip
        run: |
          mkdir -p /tmp/permcheck
          cd /tmp/permcheck
          unzip -q "$GITHUB_WORKSPACE/chesswright-linux.zip" chesswright-linux/chesswright
          if [ ! -x chesswright-linux/chesswright ]; then
            echo "::error::chesswright-linux/chesswright is not executable inside the zip -- the exact bug from v0.1.0's first release."
            exit 1
          fi
          echo "OK: chesswright-linux/chesswright is executable inside the published zip."

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: "*.zip"
          generate_release_notes: true
