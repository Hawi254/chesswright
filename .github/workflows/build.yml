# BRIEF.md S2/Phase C: cross-platform PyInstaller build matrix.
#
# What this DOES verify: that a build actually succeeds on real Windows
# and macOS (not just Linux, the only platform directly testable in
# development) -- a real executable/app bundle comes out the other end.
#
# What this DOES NOT verify: that the built artifact actually RUNS
# correctly on that platform. Code-signing/Gatekeeper warnings on
# unsigned macOS apps, antivirus false-positives on unsigned Windows
# .exes, and platform-specific path/permission quirks can only be caught
# by a real person launching the artifact on that OS -- that's what
# Phase D's pilot group is explicitly for, not a gap this workflow is
# trying to close.
#
# Stockfish is never installed/bundled here, deliberately -- see
# BRIEF.md S1. Every build expects the END USER to have their own
# Stockfish install; the onboarding wizard's engine-detection step
# (dashboard/onboarding_view.py) handles that at runtime, not at build
# time.
name: Build desktop app

on:
  push:
    tags:
      - "v*"
  pull_request:
    paths:
      - "desktop_app.py"
      - "chesswright.spec"
      - "dashboard/**"
      - "*.py"
      - "config.yaml"
      - "migrations/**"
      - "requirements.txt"
      - ".github/workflows/build.yml"
  workflow_dispatch: {}

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: chesswright-linux
          - os: windows-latest
            artifact_name: chesswright-windows
          - os: macos-latest
            artifact_name: chesswright-macos
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      # NOT used on Linux -- see the venv step below for why. Still used
      # as-is on Windows/macOS, which have no equivalent gi/GTK problem
      # (pywebview uses native Edge WebView2 / Cocoa backends there).
      - uses: actions/setup-python@v5
        if: matrix.os != 'ubuntu-latest'
        with:
          python-version: "3.12"

      # pywebview's Linux backend needs GTK/WebKit2's introspection
      # bindings (PyGObject/`gi`) -- C-extension bindings tied to the
      # SYSTEM's GTK install, not something pip can build standalone.
      # Confirmed locally during development (the same fix is being
      # applied here, not a new one): a venv without --system-site-
      # packages can import pywebview but can't actually open a window.
      - name: Install Linux GTK/WebKit dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-gi python3-gi-cairo gir1.2-gtk-3.0 \
            gir1.2-webkit2-4.1 libgirepository1.0-dev gcc libcairo2-dev \
            pkg-config python3-dev python3-venv python3-pip

      # The actual bug a real pilot tester hit (v0.1.1): `gi` was
      # importable in EVERY local dev/build check throughout this
      # project, but never in CI -- root cause, confirmed by reading
      # what these two steps actually do, not assumed: actions/setup-
      # python@v5 downloads and installs its OWN self-contained Python
      # build, completely separate from the runner image's pre-installed
      # system python3 -- the one the apt step above actually populates
      # with `gi`. Every later step (pip install, pyinstaller) was
      # running against that DOWNLOADED interpreter, which never had `gi`
      # at all, so PyInstaller correctly never found it to bundle -- it
      # genuinely wasn't there. Fixed the same way the local dev venv was
      # fixed earlier in this project: build a venv from the SYSTEM
      # python3 (not setup-python's one) with --system-site-packages, so
      # it inherits the apt-installed `gi` bindings. Prepending its bin/
      # to GITHUB_PATH means every later step's plain `python`/`pip`/
      # `pyinstaller` calls resolve into this venv automatically, with no
      # other step needing to change.
      - name: Set up Linux build venv (inherits system gi/GTK bindings)
        if: matrix.os == 'ubuntu-latest'
        run: |
          python3 -m venv --system-site-packages .venv
          echo "$PWD/.venv/bin" >> "$GITHUB_PATH"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build with PyInstaller
        run: pyinstaller chesswright.spec --noconfirm

      # Confirmed live (the actual bug, not a hypothetical), not just
      # building and hoping: the build succeeding does not mean `gi` was
      # actually bundled -- v0.1.1's Linux build "succeeded" and still
      # crashed at runtime with "GTK cannot be loaded: No module named
      # 'gi'". Checking inside the FROZEN bundle's own internal/ directory
      # for a real gi package, in this run, against the artifact about to
      # ship, catches that class of failure before a pilot tester does.
      - name: Verify gi/GTK bindings were actually bundled (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          if [ ! -d "dist/chesswright/_internal/gi" ]; then
            echo "::error::gi package missing from the frozen bundle -- pywebview will fail with 'GTK cannot be loaded' at runtime, the exact v0.1.1 bug."
            exit 1
          fi
          echo "OK: gi package is present in the frozen Linux bundle."

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/chesswright/
          retention-days: 30

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    # The default GITHUB_TOKEN is read-only unless a job explicitly
    # requests write access -- confirmed live, not assumed: the first
    # real tag push failed this exact step with a 403 ("Resource not
    # accessible by integration") because this permissions block didn't
    # exist yet.
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      # actions/upload-artifact does NOT preserve POSIX permission bits
      # (a well-documented GitHub Actions limitation, not something this
      # workflow did wrong specifically) -- the `build` job's PyInstaller
      # step produces an executable `chesswright` binary with the exec
      # bit set, but it comes back out of the artifact non-executable.
      # Confirmed live: v0.1.0's first published release had this exact
      # bug -- `./chesswright` on Linux failed with "Permission denied".
      # Re-applying chmod here, before re-zipping, is the standard fix --
      # Windows' .exe needs no equivalent (NTFS doesn't use exec bits).
      - name: Restore executable permission lost by upload-artifact
        run: |
          chmod +x artifacts/chesswright-linux/chesswright
          chmod +x artifacts/chesswright-macos/chesswright

      # Each platform's artifact is a whole directory (PyInstaller
      # --onedir, not --onefile -- see chesswright.spec's own notes on
      # why) -- zipped here so the release page offers one downloadable
      # file per platform instead of an unzipped tree.
      - name: Zip each platform's build
        run: |
          cd artifacts
          for dir in */; do
            name="${dir%/}"
            zip -r "../${name}.zip" "$name"
          done

      # Checks the fix actually worked, in THIS run, on the ACTUAL zips
      # about to be published -- not just trusting that chmod+zip do what
      # they're supposed to. Downloading a multi-hundred-MB release asset
      # back down to verify it by hand is real but slow/unreliable from a
      # typical dev machine; checking it here, right after creating it,
      # costs nothing extra and catches a regression before it ships
      # rather than after a pilot tester reports it again.
      - name: Verify executable permission survived the zip
        run: |
          mkdir -p /tmp/permcheck
          cd /tmp/permcheck
          unzip -q "$GITHUB_WORKSPACE/chesswright-linux.zip" chesswright-linux/chesswright
          if [ ! -x chesswright-linux/chesswright ]; then
            echo "::error::chesswright-linux/chesswright is not executable inside the zip -- the exact bug from v0.1.0's first release."
            exit 1
          fi
          echo "OK: chesswright-linux/chesswright is executable inside the published zip."

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: "*.zip"
          generate_release_notes: true
