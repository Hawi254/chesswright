# BRIEF.md S2/Phase C: cross-platform PyInstaller build matrix.
#
# What this DOES verify: that a build actually succeeds on real Windows
# and macOS (not just Linux, the only platform directly testable in
# development) -- a real executable/app bundle comes out the other end.
#
# What this DOES NOT verify: that the built artifact actually RUNS
# correctly on that platform. Code-signing/Gatekeeper warnings on
# unsigned macOS apps, antivirus false-positives on unsigned Windows
# .exes, and platform-specific path/permission quirks can only be caught
# by a real person launching the artifact on that OS -- that's what
# Phase D's pilot group is explicitly for, not a gap this workflow is
# trying to close.
#
# Stockfish is never installed/bundled here, deliberately -- see
# BRIEF.md S1. Every build expects the END USER to have their own
# Stockfish install; the onboarding wizard's engine-detection step
# (dashboard/onboarding_view.py) handles that at runtime, not at build
# time.
name: Build desktop app

on:
  push:
    tags:
      - "v*"
  pull_request:
    paths:
      - "desktop_app.py"
      - "chesswright.spec"
      - "dashboard/**"
      - "*.py"
      - "config.yaml"
      - "migrations/**"
      - "requirements.txt"
      - ".github/workflows/build.yml"
  workflow_dispatch: {}

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: chesswright-linux
          - os: windows-latest
            artifact_name: chesswright-windows
          - os: macos-latest
            artifact_name: chesswright-macos
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # pywebview's Linux backend needs GTK/WebKit2's introspection
      # bindings (PyGObject) -- these are C-extension bindings tied to
      # the system's GTK install, not something pip can build cleanly
      # on its own. Confirmed locally during development: a venv without
      # --system-site-packages (or, here, without these apt packages
      # present at all) can import pywebview but it can't actually open
      # a window -- silent failure, not an import error.
      - name: Install Linux GTK/WebKit dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-gi python3-gi-cairo gir1.2-gtk-3.0 \
            gir1.2-webkit2-4.1 libgirepository1.0-dev gcc libcairo2-dev \
            pkg-config python3-dev

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build with PyInstaller
        run: pyinstaller chesswright.spec --noconfirm

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/chesswright/
          retention-days: 30

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    # The default GITHUB_TOKEN is read-only unless a job explicitly
    # requests write access -- confirmed live, not assumed: the first
    # real tag push failed this exact step with a 403 ("Resource not
    # accessible by integration") because this permissions block didn't
    # exist yet.
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      # Each platform's artifact is a whole directory (PyInstaller
      # --onedir, not --onefile -- see chesswright.spec's own notes on
      # why) -- zipped here so the release page offers one downloadable
      # file per platform instead of an unzipped tree.
      - name: Zip each platform's build
        run: |
          cd artifacts
          for dir in */; do
            name="${dir%/}"
            zip -r "../${name}.zip" "$name"
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: "*.zip"
          generate_release_notes: true
